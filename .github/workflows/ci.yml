name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions: {}

jobs:
  test:
    if: github.event_name == 'push' || github.event.pull_request.user.login == github.repository_owner
    name: OTP ${{ matrix.otp }} / Elixir ${{ matrix.elixir }}
    runs-on: ubuntu-latest
    permissions:
      contents: read # checkout source
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}-test-${{ matrix.otp }}-${{ matrix.elixir }}
      cancel-in-progress: true
    strategy:
      fail-fast: false
      matrix:
        include:
          - otp: "29.0"
            elixir: "1.20.0-rc.5"
            version-type: "strict"

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install zizmor
        shell: bash
        run: |
          mkdir -p "$HOME/.local/bin"
          curl -fsSL https://github.com/zizmorcore/zizmor/releases/download/v1.25.2/zizmor-x86_64-unknown-linux-gnu.tar.gz \
            | tar -xz -C "$HOME/.local/bin" zizmor
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - uses: erlef/setup-beam@fc68ffb90438ef2936bbb3251622353b3dcb2f93 # v1.24.0
        env:
          INSTALL_DIR_FOR_OTP: ${{ runner.tool_cache }}/setup-beam/otp-${{ matrix.otp }}
          INSTALL_DIR_FOR_ELIXIR: ${{ runner.tool_cache }}/setup-beam/elixir-${{ matrix.elixir }}
        with:
          elixir-version: ${{ matrix.elixir }}
          otp-version: ${{ matrix.otp }}
          version-type: ${{ matrix.version-type }}

      - name: Cache Elixir
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            _build
            deps
            ~/.mix
          key: mix-otp${{ matrix.otp }}-elixir${{ matrix.elixir }}-${{ hashFiles('**/mix.lock') }}
          restore-keys: mix-otp${{ matrix.otp }}-elixir${{ matrix.elixir }}-

      - name: Install dependencies
        run: |
          mix local.hex --force
          mix local.rebar --force
          mix deps.get

      - name: Compile
        run: MIX_ENV=test mix compile --warnings-as-errors

      - name: Check formatting
        run: MIX_ENV=test mix format --check-formatted --dry-run

      - name: Credo
        run: MIX_ENV=test mix credo --strict

      - name: Dialyzer
        run: MIX_ENV=test mix dialyzer

      - name: Elixir tests
        run: MIX_ENV=test mix test --color

      - run: zizmor --offline --persona=pedantic .github/workflows
