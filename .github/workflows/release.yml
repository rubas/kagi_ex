name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to publish (e.g., v0.1.0)"
        required: true

permissions: {}

jobs:
  detect:
    name: Detect release target
    runs-on: ubuntu-latest
    permissions:
      contents: read # checkout source to resolve version
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}-detect
      cancel-in-progress: false
    outputs:
      should_release: ${{ steps.resolve.outputs.should_release }}
      tag: ${{ steps.resolve.outputs.tag }}
      version: ${{ steps.resolve.outputs.version }}
      tag_exists: ${{ steps.resolve.outputs.tag_exists }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Resolve release target
        id: resolve
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            TAG="$INPUT_TAG"
            VERSION="${TAG#v}"
            SHOULD_RELEASE=true
          else
            VERSION="$(sed -n 's/^  @version "\([^"]*\)"$/\1/p' mix.exs | head -n1)"
            PREVIOUS_VERSION="$(git show HEAD^:mix.exs 2>/dev/null | sed -n 's/^  @version "\([^"]*\)"$/\1/p' | head -n1)"

            if [ -z "$VERSION" ]; then
              echo "Failed to read current mix.exs version" >&2
              exit 1
            fi

            TAG="v$VERSION"

            if [ "$VERSION" = "$PREVIOUS_VERSION" ]; then
              SHOULD_RELEASE=false
            else
              SHOULD_RELEASE=true
            fi
          fi

          if git rev-parse -q --verify "refs/tags/$TAG" >/dev/null; then
            TAG_EXISTS=true
          else
            TAG_EXISTS=false
          fi

          echo "should_release=$SHOULD_RELEASE" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag_exists=$TAG_EXISTS" >> "$GITHUB_OUTPUT"

      - name: Skip when version did not change
        if: steps.resolve.outputs.should_release != 'true'
        run: echo "mix.exs version unchanged; release skipped"

  tag:
    name: Create and push release tag
    runs-on: ubuntu-latest
    needs: detect
    if: github.event_name == 'push' && needs.detect.outputs.should_release == 'true' && needs.detect.outputs.tag_exists != 'true'
    permissions:
      contents: write # push the release tag
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}-tag
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          # zizmor: ignore[artipacked] this job pushes a git tag and requires persisted credentials

      - name: Create and push release tag
        env:
          TAG: ${{ needs.detect.outputs.tag }}
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git tag "$TAG"
          git push origin "$TAG"

  release:
    name: GitHub Release
    needs:
      - detect
      - tag
    if: always() && needs.detect.outputs.should_release == 'true' && (needs.tag.result == 'success' || needs.tag.result == 'skipped')
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the GitHub release
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}-release
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: main
          persist-credentials: false

      - name: Create release
        # zizmor: ignore[superfluous-actions] action-gh-release handles release-notes generation and asset upload more reliably than an inline gh script
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          tag_name: ${{ needs.detect.outputs.tag }}
          target_commitish: main
          generate_release_notes: true
