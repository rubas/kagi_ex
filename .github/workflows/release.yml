name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to publish (e.g., v0.1.0)"
        required: true

permissions:
  contents: write

concurrency:
  group: release-${{ github.event_name }}-${{ github.ref_name || inputs.tag }}
  cancel-in-progress: false

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.resolve.outputs.should_release }}
      tag: ${{ steps.resolve.outputs.tag }}
      version: ${{ steps.resolve.outputs.version }}
      tag_exists: ${{ steps.resolve.outputs.tag_exists }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Resolve release target
        id: resolve
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
            VERSION="${TAG#v}"
            SHOULD_RELEASE=true
          else
            VERSION="$(sed -n 's/^  @version "\([^"]*\)"$/\1/p' mix.exs | head -n1)"
            PREVIOUS_VERSION="$(git show HEAD^:mix.exs 2>/dev/null | sed -n 's/^  @version "\([^"]*\)"$/\1/p' | head -n1)"

            if [ -z "$VERSION" ]; then
              echo "Failed to read current mix.exs version" >&2
              exit 1
            fi

            TAG="v$VERSION"

            if [ "$VERSION" = "$PREVIOUS_VERSION" ]; then
              SHOULD_RELEASE=false
            else
              SHOULD_RELEASE=true
            fi
          fi

          if git rev-parse -q --verify "refs/tags/$TAG" >/dev/null; then
            TAG_EXISTS=true
          else
            TAG_EXISTS=false
          fi

          echo "should_release=$SHOULD_RELEASE" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag_exists=$TAG_EXISTS" >> "$GITHUB_OUTPUT"

      - name: Skip when version did not change
        if: steps.resolve.outputs.should_release != 'true'
        run: echo "mix.exs version unchanged; release skipped"

  tag:
    runs-on: ubuntu-latest
    needs: detect
    if: github.event_name == 'push' && needs.detect.outputs.should_release == 'true' && needs.detect.outputs.tag_exists != 'true'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Create and push release tag
        env:
          TAG: ${{ needs.detect.outputs.tag }}
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git tag "$TAG"
          git push origin "$TAG"

  release:
    name: GitHub Release
    needs:
      - detect
      - tag
    if: always() && needs.detect.outputs.should_release == 'true' && (needs.tag.result == 'success' || needs.tag.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: main

      - name: Create release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2.6.1
        with:
          tag_name: ${{ needs.detect.outputs.tag }}
          target_commitish: main
          generate_release_notes: true
